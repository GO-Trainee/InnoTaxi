syntax = "proto3";

// Produced events
message OrderCreatedEvent {
  int64 order_id = 1;
  int64 organization_id = 2;
  double amount = 3;
}

message UserDeletedEvent {
  int64 user_id = 1;
  int64 organization_id = 2;
}

// Consumed events
message UpdateOrganizationEvent {
  int64 organization_id = 1;
  string name = 2;
  string address = 3;
}